<!DOCTYPE html>
<html>
<head>
    <title>Waste2Worth</title>
    <link rel="icon" href="favicon.ico">

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <!-- Bootstrap (removed duplicate) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body { background: #f4f6f9; }

        .navbar { background: #2c3e50; }

        .navbar-brand {
            color: #fff !important;
            font-weight: bold;
        }

        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }

        .btn-primary {
            background: #3498db;
            border: none;
        }

        .btn-primary:hover {
            background: #2980b9;
        }

        .table thead {
            background: #3498db;
            color: white;
        }

        .chat-box {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 300px;
        }
    </style>
</head>

<body>

<!-- ✅ LOGIN CHECK (moved inside body) -->
<script>
if (!localStorage.getItem("role")) {
    window.location.href = "auth.html";
}
</script>

<!-- ✅ LOGOUT FUNCTION (only once) -->
<script>
function logout() {
    localStorage.clear();
    window.location.href = "login.html";
}
</script>
<!-- ✅ Logout Button -->
<div style="position:absolute; top:10px; right:20px;">
    <button onclick="logout()" class="btn btn-danger">Logout</button>
</div>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">

        <span class="navbar-brand">🍱 Waste2Worth</span>

        <div class="ms-auto">

            <!-- 🔴 Logout Button -->
            <button onclick="logout()" class="btn btn-danger btn-sm">
                Logout
            </button>

        </div>

    </div>
</nav>

    <!-- ➕ Add Food -->
    <div class="card p-4 mb-4">
        <h4><i class="bi bi-plus-circle"></i> Add Food</h4>

        <div class="row">
            <div class="col-md-3">
                <input id="name" class="form-control" placeholder="Food Name">
            </div>

            <div class="col-md-3">
                <input id="quantity" class="form-control" placeholder="Quantity">
            </div>

            <div class="col-md-3">
                <input id="location" class="form-control" placeholder="Location">
                <button class="btn btn-secondary mt-2" onclick="getUserLocation()">
    📍 Use My Location
                </button>
            </div>

            <div class="col-md-3">
                <input type="datetime-local" id="expiry" class="form-control">
            </div>
            
        </div>

        <button class="btn btn-primary mt-3" onclick="addFood()">Add Food</button>
    </div>

    <!-- 🔍 Filter -->
    <div class="card p-4 mb-4">
        <h4><i class="bi bi-search"></i> Search by Location</h4>

        <div class="row">
            <div class="col-md-8">
                <input id="filterLocation" class="form-control" placeholder="Enter location"
                 onkeydown="if(event.key==='Enter'){event.preventDefault(); filterFood();}">
            </div>
            <div class="col-md-4">
                <button class="btn btn-success w-100" onclick="filterFood()">Search</button>
                
                 🔍 Search Food Nearby
                </button>
            </div>
        </div>
    </div>

    <!-- 🗺 Map -->
    <div class="card p-4 mb-4">
        <h4>📍 Food Locations</h4>
        <div id="map" style="height: 400px;"></div>
    </div>

    <!-- 📋 Table -->
    <div class="card p-4">
        <h4><i class="bi bi-table"></i> Available Food</h4>

        <table class="table table-hover mt-3">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Qty</th>
                    <th>Location</th>
                    <th>Expiry</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="foodTable"></tbody>
        </table>
    </div>

</div>

<!-- 🔗 View Food -->
<div class="text-center mt-4">
    <a href="food.html" class="btn btn-success btn-lg">
        View Available Food 🍱
    </a>
</div>

<!-- 🤖 Chatbot -->
<div class="card p-3 mt-4">
    <h2>🤖 Smart AI Chatbot</h2>

    <div id="chatBox" style="border:1px solid #ccc; height:200px; overflow:auto;"></div>

    <input type="text" id="userInput" class="form-control mt-2" placeholder="Type message...">

    <button onclick="sendMessage()" class="btn btn-dark mt-2">Send</button>
</div>

<!-- ✅ SCRIPTS (correct order at bottom) -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="script.js"></script>
<script src="chatbot.js"></script>



</body>
</html>
